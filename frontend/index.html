<!doctype html>
<html lang="en" class="dark theme-dark" data-theme-preference="dark" data-theme-resolved="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dockauri</title>
    <script>
      (function () {
        var storedTheme = localStorage.getItem("dockauri-theme");
        var theme = storedTheme === "light" || storedTheme === "dark" || storedTheme === "system" ? storedTheme : "dark";
        var resolvedTheme = theme === "system"
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : theme;
        var root = document.documentElement;

        root.classList.remove("theme-light", "theme-dark", "dark");
        if (resolvedTheme === "light") {
          root.classList.add("theme-light");
        } else {
          root.classList.add("dark", "theme-dark");
        }

        root.dataset.themePreference = theme;
        root.dataset.themeResolved = resolvedTheme;
      })();
    </script>
  </head>
  <body class="bg-[var(--color-bg)] text-[var(--color-fg)]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
