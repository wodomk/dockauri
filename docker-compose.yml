services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # SDCP discovery relies on UDP broadcast on port 3000, which is unreliable in Docker bridge mode.
    # The target deployment is an LXC on Proxmox in the same L2 network as the printers, so sharing the host
    # network stack is desirable here; this still needs verification on a real LXC as soon as that environment exists.
    network_mode: host
    environment:
      DOCKAURI_BACKEND_PORT: "8080"
      DOCKAURI_DB_PATH: "/data/dockauri.sqlite"
    # With host networking enabled, backend ports are exposed directly by the host stack instead of Docker port mapping.
    volumes:
      - dockauri_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # 4173/tcp exposes the Vite preview server for the React dashboard.
      - "4173:4173"
    depends_on:
      - backend

volumes:
  dockauri_data:
    # Persistent volume for the SQLite database and other durable application data.
